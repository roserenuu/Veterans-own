    <path d="M100 20 L182 52 L182 120 Q182 170 100 200 Q18 170 18 120 L18 52 Z"/>
  </clipPath>
  <g clip-path="url(#shieldClip)">
    <!-- White base -->
    <rect x="8" y="115" width="184" height="100" fill="white"/>
    <!-- Red stripes -->
    <path d="M8 118 Q54 110 100 118 Q146 126 192 118 L192 132 Q146 140 100 132 Q54 124 8 132 Z" fill="#c8102e"/>
    <path d="M8 142 Q54 134 100 142 Q146 150 192 142 L192 156 Q146 164 100 156 Q54 148 8 156 Z" fill="#c8102e"/>
    <path d="M8 166 Q54 158 100 166 Q146 174 192 166 L192 180 Q146 188 100 180 Q54 172 8 180 Z" fill="#c8102e"/>
    <path d="M8 190 Q54 182 100 190 Q146 198 192 190 L192 212 Q146 220 100 212 Q54 204 8 212 Z" fill="#c8102e"/>

    <!-- Navy upper section -->
    <rect x="8" y="20" width="184" height="100" fill="#1a2f5a"/>

    <!-- House roofline -->
    <polyline points="30,115 100,68 145,93 145,115" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
    <rect x="118" y="95" width="16" height="20" fill="none" stroke="white" stroke-width="4"/>

    <!-- Stars -->
    <polygon points="60,48 63,57 72,57 65,63 68,72 60,66 52,72 55,63 48,57 57,57" fill="white"/>
    <polygon points="100,38 103,47 112,47 105,53 108,62 100,56 92,62 95,53 88,47 97,47" fill="white"/>
    <polygon points="140,48 143,57 152,57 145,63 148,72 140,66 132,72 135,63 128,57 137,57" fill="white"/>
  </g>
</svg>
