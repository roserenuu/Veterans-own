<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Shield outline -->
  <path d="M100 8 L192 44 L192 120 Q192 178 100 212 Q8 178 8 120 L8 44 Z"
        fill="#1a2f5a" stroke="white" stroke-width="5"/>
  <!-- Inner shield border -->
  <path d="M100 20 L182 52 L182 120 Q182 170 100 200 Q18 170 18 120 L18 52 Z"
        fill="none" stroke="white" stroke-width="3"/>

  <!-- Red and white stripes in lower half (wavy) -->
